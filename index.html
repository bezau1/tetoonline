<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重音テト TTS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111;
      --surface: #1c1c1c;
      --accent: #e8457a;
      --accent2: #c9376a;
      --text: #eee;
      --muted: #666;
      --border: #2a2a2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 1.2rem 4rem;
    }

    header {
      margin-bottom: 2rem;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 10vw, 4rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--accent);
    }

    .logo span {
      color: var(--text);
      font-size: 0.5em;
      display: block;
      letter-spacing: 0.25em;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 0.4rem;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .voice-section { margin-top: 1.5rem; }

    .voice-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .voice-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 0.8rem;
      border-radius: 4px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .voice-btn:hover {
      border-color: #444;
      color: var(--text);
    }

    .voice-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .input-section { margin-top: 1.5rem; }

    .text-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      padding: 0.9rem 1rem;
      resize: none;
      height: 110px;
      outline: none;
      transition: border-color 0.15s;
    }

    .text-input:focus { border-color: #444; }
    .text-input::placeholder { color: var(--muted); }

    .controls {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.8rem;
      align-items: center;
    }

    .speak-btn {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.75rem 1.2rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s;
    }

    .speak-btn:hover { background: var(--accent2); }
    .speak-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .stop-btn {
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .stop-btn:hover { color: var(--text); border-color: #444; }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.9rem;
    }

    .slider-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
      width: 2.5rem;
    }

    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }

    .slider-val {
      font-size: 0.78rem;
      color: var(--muted);
      min-width: 2.5rem;
      text-align: right;
    }

    .status-area {
      margin-top: 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.8rem 1rem;
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 28px;
    }

    .wave-bar {
      width: 3px;
      background: var(--accent);
      border-radius: 1px;
      height: 4px;
    }

    .playing .wave-bar:nth-child(1) { animation: wave 0.8s 0.0s infinite ease-in-out; }
    .playing .wave-bar:nth-child(2) { animation: wave 0.8s 0.1s infinite ease-in-out; }
    .playing .wave-bar:nth-child(3) { animation: wave 0.8s 0.2s infinite ease-in-out; }
    .playing .wave-bar:nth-child(4) { animation: wave 0.8s 0.15s infinite ease-in-out; }
    .playing .wave-bar:nth-child(5) { animation: wave 0.8s 0.05s infinite ease-in-out; }
    .playing .wave-bar:nth-child(6) { animation: wave 0.8s 0.25s infinite ease-in-out; }
    .playing .wave-bar:nth-child(7) { animation: wave 0.8s 0.1s infinite ease-in-out; }

    @keyframes wave {
      0%, 100% { height: 3px; }
      50% { height: 22px; }
    }

    .status-text {
      color: var(--muted);
      font-size: 0.82rem;
      flex: 1;
    }

    .status-text.active { color: var(--text); }

    audio { display: none; }
    audio.visible { display: block; width: 100%; margin-top: 0.8rem; }

    .info-box {
      margin-top: 2rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .info-box strong { color: #999; }

    @media (max-width: 480px) {
      .controls { flex-direction: column; }
      .speak-btn, .stop-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">テト<span>TTS</span></div>
      <p class="tagline">重音テト · UTAU Voice Synthesizer</p>
    </header>

    <div class="voice-section">
      <div class="section-label">Voice Bank</div>
      <div class="voice-grid" id="voiceGrid">
        <button class="voice-btn active" data-voice="standard">Standard</button>
        <button class="voice-btn" data-voice="whisper">Whisper</button>
        <button class="voice-btn" data-voice="extra">Extra</button>
        <button class="voice-btn" data-voice="rikimi">RIKIMI</button>
        <button class="voice-btn" data-voice="sakebi">SAKEBI</button>
        <button class="voice-btn" data-voice="weak">Weak</button>
        <button class="voice-btn" data-voice="edge">Edge</button>
        <button class="voice-btn" data-voice="smooth">Smooth</button>
        <button class="voice-btn" data-voice="english">English</button>
        <button class="voice-btn" data-voice="past">Past</button>
      </div>
    </div>

    <div class="input-section">
      <div class="section-label">Input Text (Japanese / Romaji)</div>
      <textarea class="text-input" id="textInput" placeholder="ここにテキストを入力してください..."></textarea>
    </div>

    <div class="controls">
      <button class="speak-btn" id="speakBtn">▶ SPEAK</button>
      <button class="stop-btn" id="stopBtn">■ Stop</button>
    </div>

    <div class="slider-row">
      <span class="slider-label">Speed</span>
      <input type="range" id="speedSlider" min="0.5" max="2" step="0.05" value="1">
      <span class="slider-val" id="speedVal">1.0×</span>
    </div>

    <div class="slider-row">
      <span class="slider-label">Pitch</span>
      <input type="range" id="pitchSlider" min="0.5" max="2" step="0.05" value="1">
      <span class="slider-val" id="pitchVal">1.0×</span>
    </div>

    <div class="status-area">
      <div class="waveform" id="waveform">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <span class="status-text" id="statusText">Ready — select a voice and type something</span>
    </div>

    <audio id="audioOut" controls></audio>
    <a id="downloadBtn" style="display:none; margin-top:0.8rem; color:var(--accent); font-size:0.85rem; font-weight:700; text-decoration:none;">↓ Download WAV</a>


  </div>

  <script src="teto.js"></script>
</body>
</html>
